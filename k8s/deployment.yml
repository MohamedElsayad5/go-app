apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app-deploy
  namespace: dg-survey
  labels:
    app: go-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
        - name: go-app
          image: moeyelsayad777/comingsoon-page:latest
          ports:
            - containerPort: 8080
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-service:27017"
            - name: SERVER_PORT
              value: "8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deploy
  namespace: dg-survey
  labels:
    app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          ports:
            - containerPort: 27017