apiVersion: v1
kind: Service
metadata:
  name: go-app-service
  namespace: dg-survey
spec:
  selector:
    app: go-app
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: dg-survey
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP