version: "3.8"

services:
  app:
    build: .
    image: go-app
    container_name: go-app
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - MONGO_URI=mongodb://db:27017
    depends_on:
      - db

  db:
    image: mongo:latest
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"